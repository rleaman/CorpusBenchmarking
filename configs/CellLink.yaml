name: CellLink

cache_filename: corpora/CellLink.json.gz

acquisition:
  source_url: "https://zenodo.org/api/records/18090009/files/data.zip/content"
  format: "zip"

loader:
  name: bioc_xml
  params:
    paths:
      train: corpora/CellLink/splits/NLM-CellLink-corpus-train.xml  
      dev: corpora/CellLink/splits/NLM-CellLink-corpus-val.xml  
    label_infon_key: type
    id_format_list: [[";", "distributive", "True"], [",", "related_set", "True"]]
    qualifier_map: {"(skos:exact)": "exact", "(skos:related)": "related"}
    nil_labels: [ "-" ]
    doc_id_map:
        pmid: ["__HEADER_INFON__", "article-id_pmid"]
        pmcid: ["__HEADER_INFON__", "article-id_pmc"]

filters:
    cell_phenotype_exact_single:
        labels: ["cell_phenotype"]
        link_relations: [] # No composite links allowed
        match_types: ["exact"]
    cell_phenotype_related_single:
        labels: ["cell_phenotype"]
        link_relations: [] # No composite links allowed
        match_types: ["related"]
    cell_hetero_single:
        labels: ["cell_hetero"]
        link_relations: [] # No composite links allowed
        match_types: ["exact", "related"]
       

