name: NLM_Chem

acquisition:
  source_url: "https://ftp.ncbi.nlm.nih.gov/pub/lu/BC7-NLM-Chem-track/BC7T2-NLMChem-corpus_v2.BioC.xml.gz"
  format: "tar"
  
loader:
  name: bioc_xml
  params:
    paths:
      train: corpora/NLM_Chem/BC7T2-NLMChem-corpus-train.BioC.xml
      dev: corpora/NLM_Chem/BC7T2-NLMChem-corpus-dev.BioC.xml
      test: corpora/NLM_Chem/BC7T2-NLMChem-corpus-test.BioC.xml
    label_infon_key: type
    id_format_list: [[",", "distributive", "False"]]
    nil_labels: { "-" }
    label_map: {"Chemical": "Chemical", "MeSH_Indexing_Chemical": null}
    doc_id_map:
        pmid: ["__HEADER_INFON__", "article-id_pmid"]
        pmcid: ["__HEADER_INFON__", "article-id_pmc"]
        doi: ["__HEADER_INFON__", "article-id_doi"]



