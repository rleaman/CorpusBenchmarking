name: CHEMDNER

acquisition:
  source_url: "https://ftp.ncbi.nlm.nih.gov/pub/lu/BC7-NLM-Chem-track/BC7T2-CHEMDNER-corpus_v2.BioC.xml.gz"
  format: "tar"

loader:
  name: bioc_xml
  params:
    paths:
      train: corpora/CHEMDNER/BC7T2-CHEMDNER-corpus-training.BioC.xml
      dev: corpora/CHEMDNER/BC7T2-CHEMDNER-corpus-development.BioC.xml
      test: corpora/CHEMDNER/BC7T2-CHEMDNER-corpus-evaluation.BioC.xml
    label_infon_key: type
    label_map: {"Chemical": "Chemical", "MeSH_Indexing_Chemical": null}
    doc_id_map:
        pmid: "__DOCUMENT_ID__"

